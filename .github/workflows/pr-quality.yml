name: pr-quality

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run fast quality gate
        shell: bash
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s['check:fast'] ? 0 : 1)"; then
            pnpm run check:fast
            exit 0
          fi
          pnpm run lint
          pnpm run typecheck
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s['test:unit'] ? 0 : 1)"; then
            pnpm run test:unit
          else
            pnpm test
          fi
