name: postdeploy-smoke

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Deployment URL to verify, e.g. https://example.com"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: postdeploy-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve target URL
        id: target
        shell: bash
        run: |
          TARGET_URL="${{ github.event.inputs.base_url || '' }}"
          if [ -z "$TARGET_URL" ]; then
            TARGET_URL="${{ github.event.deployment_status.environment_url || '' }}"
          fi
          if [ -z "$TARGET_URL" ]; then
            TARGET_URL="${{ github.event.deployment_status.target_url || '' }}"
          fi
          if [ -z "$TARGET_URL" ]; then
            echo "Unable to determine deployment URL."
            exit 1
          fi
          echo "base_url=$TARGET_URL" >> "$GITHUB_OUTPUT"

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run post-deploy smoke suite
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.target.outputs.base_url }}
        run: pnpm exec playwright test tests/e2e/smoke.spec.ts tests/e2e/writing.spec.ts --project=desktop-chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-postdeploy-smoke
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
