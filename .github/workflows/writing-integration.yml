name: writing-integration

on:
  pull_request:
    branches:
      - main
    paths:
      - "app/writing/**"
      - "components/mdx/**"
      - "lib/writing.ts"
      - "lib/mdx-compile.ts"
      - "lib/types.ts"
      - "scripts/upload-writing.ts"
      - "supabase/**"
      - "tests/**"
      - "playwright.config.ts"
      - ".github/workflows/writing-integration.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: writing-integration-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  writing-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.CI_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY }}
      PLAYWRIGHT_BASE_URL: ${{ secrets.CI_WRITING_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run writing data integration gate
        shell: bash
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s['test:data'] ? 0 : 1)"; then
            pnpm run test:data
            exit 0
          fi
          pnpm test

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run writing browser integration checks
        shell: bash
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s['test:e2e:writing'] ? 0 : 1)"; then
            pnpm run test:e2e:writing
            exit 0
          fi
          pnpm exec playwright test tests/e2e/writing.spec.ts --project=desktop-chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-writing-integration
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
