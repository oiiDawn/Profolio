name: nightly-health

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      run_visual:
        description: "Run visual regression suite"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: nightly-health-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run full quality gate
        shell: bash
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s['check:full'] ? 0 : 1)"; then
            pnpm run check:full
            exit 0
          fi
          pnpm run lint
          pnpm run typecheck
          pnpm test
          pnpm build

  browser-health:
    needs: full-check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke tests
        shell: bash
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s['test:e2e:smoke'] ? 0 : 1)"; then
            pnpm run test:e2e:smoke
            exit 0
          fi
          pnpm exec playwright test tests/e2e/smoke.spec.ts --project=desktop-chromium --project=mobile-chrome

      - name: Run a11y tests
        shell: bash
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s['test:a11y'] ? 0 : 1)"; then
            pnpm run test:a11y
            exit 0
          fi
          pnpm exec playwright test tests/e2e/a11y.spec.ts --project=desktop-chromium

      - name: Run visual regression suite
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_visual }}
        shell: bash
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s['test:visual'] ? 0 : 1)"; then
            pnpm run test:visual
            exit 0
          fi
          pnpm exec playwright test tests/e2e/visual.spec.ts --project=desktop-chromium --project=mobile-chrome

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-nightly-health
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
